<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROV Tournament Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #03060f;
    --bg-card: #080e1e;
    --bg-card2: #0b1225;
    --blue-vivid: #00a8ff;
    --blue-mid: #0066cc;
    --blue-dim: #003a7a;
    --blue-glow: rgba(0,168,255,0.18);
    --blue-glow2: rgba(0,168,255,0.07);
    --accent: #00d4ff;
    --accent2: #0080ff;
    --text-primary: #e8f4ff;
    --text-secondary: #7ba8cc;
    --text-dim: #3a5a7a;
    --border: rgba(0,168,255,0.15);
    --border-bright: rgba(0,168,255,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid bg pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,168,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,168,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ambient glow orbs */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,80,180,0.12) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb-right {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,60,160,0.1) 0%, transparent 70%);
    bottom: -150px; right: -150px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── HEADER ── */
  .header { text-align: center; padding: 3rem 0 2.5rem; position: relative; }

  .header-eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--blue-vivid);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.8;
  }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .header-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    color: var(--text-secondary);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-line {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue-vivid), transparent);
    margin: 1.5rem auto 0;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 2rem 0 3rem;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-pill::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue-vivid), transparent);
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── TEAMS GRID ── */
  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ── TEAM CARD ── */
  .team-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .team-card:hover {
    border-color: var(--border-bright);
    box-shadow: 0 0 30px var(--blue-glow), inset 0 0 30px var(--blue-glow2);
  }

  .team-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-vivid), var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .team-card:hover::before { opacity: 1; }

  /* corner decorations */
  .team-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 40px; height: 40px;
    border-top: 1px solid var(--border-bright);
    border-right: 1px solid var(--border-bright);
    border-radius: 0 6px 0 0;
    pointer-events: none;
  }

  .team-header {
    padding: 14px 18px 12px;
    background: var(--bg-card2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  .team-num {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--blue-dim);
    letter-spacing: 1px;
    position: absolute;
    top: 8px; right: 14px;
  }

  .team-icon-wrap {
    width: 34px; height: 34px;
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    background: var(--blue-glow);
    flex-shrink: 0;
  }

  .team-icon-wrap svg { width: 16px; height: 16px; fill: var(--blue-vivid); }

  .team-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 1px;
    line-height: 1.2;
  }

  .team-meta {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── PLAYER ROWS ── */
  .player-list { padding: 6px 0; }

  .player-row {
    display: flex;
    align-items: center;
    padding: 7px 18px;
    gap: 10px;
    border-bottom: 1px solid rgba(0,168,255,0.05);
    transition: background 0.15s;
  }

  .player-row:last-child { border-bottom: none; }
  .player-row:hover { background: rgba(0,168,255,0.05); }

  .player-num {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--text-dim);
    width: 14px;
    flex-shrink: 0;
    text-align: right;
  }

  .player-divider {
    width: 1px; height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  .player-name {
    font-size: 13.5px;
    font-weight: 400;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .player-sep {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .player-char {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
</style>
</head>
<body>
<div class="glow-orb-right"></div>

    <div class="header-line"></div>

  grid.appendChild(card);

</script>
</body>
</html>
